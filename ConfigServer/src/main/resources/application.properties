spring.application.name=ConfigServer

server.port=8888

# --- Git-backed config repo ---
# Replace YOUR_GITHUB_USERNAME and YOUR_REPO_NAME with your actual values.
# Example: https://github.com/karioke/microservices-config
spring.cloud.config.server.git.uri=https://github.com/kariukialex999/ConfigServer.git

# The branch to read config from
spring.cloud.config.server.git.default-label=main

# Clone the repo on startup rather than on first request ? catches errors early
spring.cloud.config.server.git.clone-on-start=true

# How long (seconds) to wait before re-fetching from GitHub
spring.cloud.config.server.git.refresh-rate=30

# --- Eureka ---
# Config server registers itself so services can discover it by name
# instead of hardcoding port 8888 in every bootstrap.properties
eureka.client.service-url.defaultZone=http://localhost:9000/eureka/
eureka.instance.prefer-ip-address=true
